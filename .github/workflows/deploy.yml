# GitHub Actions workflow for deploying Angular app to GitHub Pages.
# Triggers on push to main branch and builds/deploys the production bundle.

name: Deploy to GitHub Pages

# Trigger on push to main/master branch
on:
  push:
    branches: [main, master]
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to avoid overlapping deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job: compiles the Angular app and uploads the artifact
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build -- --configuration production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the dist/angular-ngrx directory (the production build output)
          path: "./dist/angular-ngrx"

  # Deploy job: publishes the built artifact to GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
